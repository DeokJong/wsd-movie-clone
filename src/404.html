<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // SPA 라우팅을 위해 404.html에서 index.html로 리다이렉트
      const pathname = window.location.pathname.replace('/wsd-movie-clone', '');
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(`/wsd-movie-clone/index.html?redirect=${pathname}${search}${hash}`);
    </script>
  </head>
  <body></body>
</html>
